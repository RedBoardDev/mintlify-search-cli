version: "2"

linters:
  default: standard
  enable:
    - errorlint
    - gocritic
    - gosec
    - misspell
    - nakedret
    - nilerr
    - prealloc
    - revive
    - unconvert
    - unparam
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/redboard/mintlify-search-cli
