version: "2"

linters:
  default: standard
  enable:
    - errorlint
    - gocritic
    - gosec
    - misspell
    - nakedret
    - nilerr
    - prealloc
    - revive
    - unconvert
    - unparam

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/redboard/mintlify-search-cli
